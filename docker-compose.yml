services:
  postgres:
    image: postgres:16-alpine
    container_name: rehab_tomogotchi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rehabilitatetomogotchi
    ports:
      - "5432:5432"
    volumes:
      - rehab_tomogotchi_data:/var/lib/postgresql/data

volumes:
  rehab_tomogotchi_data:
